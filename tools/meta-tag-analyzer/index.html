<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Analyzer — SEObolt Free SEO Tools</title>
    <meta name="description" content="Free meta tag analyzer tool. Paste any HTML and instantly analyze title tags, meta descriptions, Open Graph tags, Twitter cards, and more.">
    <style>
        :root {
            --gold: #c9a227;
            --gold-dark: #a88620;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6c757d;
            --border: #e0e0e0;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--text);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { font-size: 20px; font-weight: 700; color: #fff; }
        .logo span { color: var(--gold); }

        header nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        header nav a:hover { color: var(--gold); }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
            width: 100%;
        }

        h1 { font-size: 28px; margin-bottom: 8px; }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #cce5ff; color: #004085; }

        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 200px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.15);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: var(--gold);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: var(--gold-dark); }

        button.secondary {
            background: #e9ecef;
            color: var(--text);
        }

        button.secondary:hover { background: #dee2e6; }

        .tag-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tag-table th {
            text-align: left;
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .tag-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: top;
        }

        .tag-table tr:last-child td { border-bottom: none; }

        .tag-name {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }

        .tag-value {
            word-break: break-all;
            max-width: 500px;
        }

        .score-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .score-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .score-number {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .score-number.green { color: var(--success); }
        .score-number.yellow { color: var(--warning); }
        .score-number.red { color: var(--danger); }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .checklist { list-style: none; }

        .checklist li {
            padding: 6px 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .check-pass { background: #d4edda; color: #155724; }
        .check-fail { background: #f8d7da; color: #721c24; }
        .check-warn { background: #fff3cd; color: #856404; }
        .check-na { background: #e2e3e5; color: #383d41; }

        .og-preview {
            max-width: 500px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 12px;
        }

        .og-preview-image {
            width: 100%;
            height: 260px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .og-preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .og-preview-content {
            padding: 12px 16px;
        }

        .og-preview-site {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .og-preview-title {
            font-size: 16px;
            font-weight: 600;
            margin: 4px 0;
            color: var(--text);
        }

        .og-preview-desc {
            font-size: 13px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--gold); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            main { margin: 20px auto; }
            h1 { font-size: 22px; }
            header { flex-direction: column; gap: 8px; }
            header nav { display: flex; gap: 12px; }
            header nav a { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEO<span>bolt</span></div>
        <nav>
            <a href="../serp-preview/">SERP Preview</a>
            <a href="../robots-txt-tester/">Robots.txt Tester</a>
            <a href="https://seobolt.io" target="_blank">Get SEObolt</a>
        </nav>
    </header>

    <main>
        <h1>Meta Tag Analyzer</h1>
        <p class="subtitle">Paste your page's HTML source to analyze meta tags, Open Graph data, Twitter cards, and SEO essentials. Instant audit with actionable recommendations.</p>

        <div class="card">
            <h2>HTML Source</h2>
            <label for="html-input">Paste HTML &lt;head&gt; content or full page HTML</label>
            <textarea id="html-input" placeholder='<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Page Title</title>
    <meta name="description" content="My page description here">
    <meta property="og:title" content="My Page Title">
    <meta property="og:description" content="My page description">
    <meta property="og:image" content="https://example.com/image.jpg">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://example.com/my-page">
</head>'></textarea>
            <div class="btn-row">
                <button onclick="analyzeHTML()">Analyze Meta Tags</button>
                <button class="secondary" onclick="loadSample()">Load Sample</button>
                <button class="secondary" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div id="results"></div>
    </main>

    <footer>
        Powered by <a href="https://seobolt.io">SEObolt</a> — Free SEO Tools by <a href="https://royalplugins.com">Royal Plugins</a>
    </footer>

    <script>
        function loadSample() {
            document.getElementById('html-input').value = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best WordPress SEO Plugin 2026 — SEObolt Pro</title>
    <meta name="description" content="SEObolt Pro is the fastest, most comprehensive WordPress SEO plugin. Rank higher with AI-powered optimization, schema markup, and real-time SERP tracking.">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
    <link rel="canonical" href="https://seobolt.io/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Best WordPress SEO Plugin 2026 — SEObolt Pro">
    <meta property="og:description" content="SEObolt Pro is the fastest WordPress SEO plugin. AI-powered optimization, schema markup, and SERP tracking.">
    <meta property="og:url" content="https://seobolt.io/">
    <meta property="og:site_name" content="SEObolt">
    <meta property="og:image" content="https://seobolt.io/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Best WordPress SEO Plugin 2026 — SEObolt Pro">
    <meta name="twitter:description" content="Rank higher with AI-powered SEO optimization.">
    <meta name="twitter:image" content="https://seobolt.io/og-image.png">

    <!-- Technical -->
    <meta name="author" content="Royal Plugins">
    <meta name="theme-color" content="#c9a227">
</head>`;
            analyzeHTML();
        }

        function clearAll() {
            document.getElementById('html-input').value = '';
            document.getElementById('results').innerHTML = '';
        }

        function analyzeHTML() {
            const html = document.getElementById('html-input').value.trim();
            if (!html) return;

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const head = doc.head;

            const tags = extractTags(head);
            const checks = runChecks(tags);
            const score = calculateScore(checks);

            renderResults(tags, checks, score);
        }

        function extractTags(head) {
            const tags = {
                title: '',
                meta: [],
                og: [],
                twitter: [],
                link: [],
                other: []
            };

            const titleEl = head.querySelector('title');
            if (titleEl) tags.title = titleEl.textContent.trim();

            head.querySelectorAll('meta').forEach(meta => {
                const name = meta.getAttribute('name') || '';
                const property = meta.getAttribute('property') || '';
                const content = meta.getAttribute('content') || '';
                const httpEquiv = meta.getAttribute('http-equiv') || '';
                const charset = meta.getAttribute('charset') || '';

                if (property.startsWith('og:')) {
                    tags.og.push({ property, content });
                } else if (name.startsWith('twitter:') || property.startsWith('twitter:')) {
                    tags.twitter.push({ name: name || property, content });
                } else if (charset) {
                    tags.meta.push({ name: 'charset', content: charset });
                } else if (httpEquiv) {
                    tags.meta.push({ name: `http-equiv:${httpEquiv}`, content });
                } else if (name) {
                    tags.meta.push({ name, content });
                }
            });

            head.querySelectorAll('link').forEach(link => {
                const rel = link.getAttribute('rel') || '';
                const href = link.getAttribute('href') || '';
                if (rel && href) {
                    tags.link.push({ rel, href });
                }
            });

            return tags;
        }

        function getMetaContent(tags, name) {
            const meta = tags.meta.find(m => m.name.toLowerCase() === name.toLowerCase());
            return meta ? meta.content : '';
        }

        function getOGContent(tags, property) {
            const og = tags.og.find(o => o.property.toLowerCase() === property.toLowerCase());
            return og ? og.content : '';
        }

        function getTwitterContent(tags, name) {
            const tw = tags.twitter.find(t => t.name.toLowerCase() === name.toLowerCase());
            return tw ? tw.content : '';
        }

        function getLinkHref(tags, rel) {
            const link = tags.link.find(l => l.rel.toLowerCase() === rel.toLowerCase());
            return link ? link.href : '';
        }

        function runChecks(tags) {
            const checks = [];
            const title = tags.title;
            const desc = getMetaContent(tags, 'description');
            const robots = getMetaContent(tags, 'robots');
            const canonical = getLinkHref(tags, 'canonical');
            const viewport = getMetaContent(tags, 'viewport');
            const ogTitle = getOGContent(tags, 'og:title');
            const ogDesc = getOGContent(tags, 'og:description');
            const ogImage = getOGContent(tags, 'og:image');
            const twitterCard = getTwitterContent(tags, 'twitter:card');
            const charset = getMetaContent(tags, 'charset');

            checks.push({
                name: 'Title tag exists',
                status: title ? 'pass' : 'fail',
                detail: title ? `"${title}"` : 'Missing title tag — critical for SEO'
            });

            if (title) {
                checks.push({
                    name: 'Title length (50-60 chars)',
                    status: title.length >= 30 && title.length <= 60 ? 'pass' : 'warn',
                    detail: `${title.length} characters${title.length > 60 ? ' — may be truncated in search results' : title.length < 30 ? ' — consider making it more descriptive' : ''}`
                });
            }

            checks.push({
                name: 'Meta description exists',
                status: desc ? 'pass' : 'fail',
                detail: desc ? `${desc.length} characters` : 'Missing — Google may generate its own snippet'
            });

            if (desc) {
                checks.push({
                    name: 'Description length (120-160 chars)',
                    status: desc.length >= 120 && desc.length <= 160 ? 'pass' : 'warn',
                    detail: `${desc.length} characters${desc.length > 160 ? ' — may be truncated' : desc.length < 120 ? ' — could be more descriptive' : ''}`
                });
            }

            checks.push({
                name: 'Canonical URL',
                status: canonical ? 'pass' : 'warn',
                detail: canonical || 'No canonical tag — recommended to prevent duplicate content'
            });

            checks.push({
                name: 'Viewport meta tag',
                status: viewport ? 'pass' : 'fail',
                detail: viewport ? 'Present — mobile-friendly' : 'Missing — page may not be mobile-friendly'
            });

            checks.push({
                name: 'Robots meta tag',
                status: robots ? (robots.includes('noindex') ? 'warn' : 'pass') : 'na',
                detail: robots || 'Not set — defaults to index, follow'
            });

            checks.push({
                name: 'Character encoding',
                status: charset ? 'pass' : 'warn',
                detail: charset || 'Not specified — should be UTF-8'
            });

            checks.push({
                name: 'Open Graph title',
                status: ogTitle ? 'pass' : 'warn',
                detail: ogTitle || 'Missing — social shares may not display correctly'
            });

            checks.push({
                name: 'Open Graph description',
                status: ogDesc ? 'pass' : 'warn',
                detail: ogDesc || 'Missing — social shares may use generic text'
            });

            checks.push({
                name: 'Open Graph image',
                status: ogImage ? 'pass' : 'warn',
                detail: ogImage || 'Missing — social shares will have no preview image'
            });

            checks.push({
                name: 'Twitter card type',
                status: twitterCard ? 'pass' : 'na',
                detail: twitterCard || 'Not set — Twitter will fall back to Open Graph tags'
            });

            return checks;
        }

        function calculateScore(checks) {
            const applicable = checks.filter(c => c.status !== 'na');
            const passed = applicable.filter(c => c.status === 'pass').length;
            return Math.round((passed / applicable.length) * 100);
        }

        function renderResults(tags, checks, score) {
            const resultsEl = document.getElementById('results');

            const scoreColor = score >= 80 ? 'green' : score >= 50 ? 'yellow' : 'red';
            const passCount = checks.filter(c => c.status === 'pass').length;
            const warnCount = checks.filter(c => c.status === 'warn').length;
            const failCount = checks.filter(c => c.status === 'fail').length;

            let html = '';

            html += `<div class="card">
                <h2>SEO Score</h2>
                <div class="score-card">
                    <div class="score-item">
                        <div class="score-number ${scoreColor}">${score}</div>
                        <div class="score-label">Overall Score</div>
                    </div>
                    <div class="score-item">
                        <div class="score-number green">${passCount}</div>
                        <div class="score-label">Passed</div>
                    </div>
                    <div class="score-item">
                        <div class="score-number yellow">${warnCount}</div>
                        <div class="score-label">Warnings</div>
                    </div>
                    <div class="score-item">
                        <div class="score-number red">${failCount}</div>
                        <div class="score-label">Failed</div>
                    </div>
                </div>
            </div>`;

            html += `<div class="card"><h2>SEO Checklist</h2><ul class="checklist">`;
            for (const check of checks) {
                const iconClass = check.status === 'pass' ? 'check-pass' : check.status === 'fail' ? 'check-fail' : check.status === 'warn' ? 'check-warn' : 'check-na';
                const icon = check.status === 'pass' ? '✓' : check.status === 'fail' ? '✕' : check.status === 'warn' ? '!' : '—';
                html += `<li><span class="check-icon ${iconClass}">${icon}</span><div><strong>${check.name}</strong><br><span style="color:var(--text-muted);font-size:12px">${check.detail}</span></div></li>`;
            }
            html += `</ul></div>`;

            html += `<div class="card"><h2>Essential Tags</h2><table class="tag-table"><thead><tr><th>Tag</th><th>Value</th><th>Status</th></tr></thead><tbody>`;

            const essentials = [
                ['title', tags.title, tags.title ? 'ok' : 'missing'],
                ['description', getMetaContent(tags, 'description'), getMetaContent(tags, 'description') ? 'ok' : 'missing'],
                ['canonical', getLinkHref(tags, 'canonical'), getLinkHref(tags, 'canonical') ? 'ok' : 'missing'],
                ['robots', getMetaContent(tags, 'robots'), 'info'],
                ['viewport', getMetaContent(tags, 'viewport'), getMetaContent(tags, 'viewport') ? 'ok' : 'missing'],
            ];

            for (const [name, value, status] of essentials) {
                const badgeCls = status === 'ok' ? 'badge-success' : status === 'missing' ? 'badge-danger' : 'badge-info';
                const badgeText = status === 'ok' ? 'Found' : status === 'missing' ? 'Missing' : 'Info';
                html += `<tr><td class="tag-name">${name}</td><td class="tag-value">${value || '<em style="color:var(--text-muted)">Not set</em>'}</td><td class="tag-status"><span class="badge ${badgeCls}">${badgeText}</span></td></tr>`;
            }
            html += `</tbody></table></div>`;

            if (tags.og.length) {
                html += `<div class="card"><h2>Open Graph Tags <span class="badge badge-info">${tags.og.length} tags</span></h2>`;
                html += `<table class="tag-table"><thead><tr><th>Property</th><th>Content</th></tr></thead><tbody>`;
                for (const tag of tags.og) {
                    html += `<tr><td class="tag-name">${tag.property}</td><td class="tag-value">${tag.content}</td></tr>`;
                }
                html += `</tbody></table>`;

                const ogTitle = getOGContent(tags, 'og:title') || tags.title;
                const ogDesc = getOGContent(tags, 'og:description') || getMetaContent(tags, 'description');
                const ogImage = getOGContent(tags, 'og:image');
                const ogSite = getOGContent(tags, 'og:site_name');

                html += `<div class="og-preview">`;
                if (ogImage) {
                    html += `<div class="og-preview-image"><img src="${ogImage}" alt="OG Preview" onerror="this.parentElement.innerHTML='Image could not be loaded'"></div>`;
                } else {
                    html += `<div class="og-preview-image">No og:image set</div>`;
                }
                html += `<div class="og-preview-content">`;
                if (ogSite) html += `<div class="og-preview-site">${ogSite}</div>`;
                html += `<div class="og-preview-title">${ogTitle || 'No title'}</div>`;
                html += `<div class="og-preview-desc">${ogDesc || 'No description'}</div>`;
                html += `</div></div></div>`;
            }

            if (tags.twitter.length) {
                html += `<div class="card"><h2>Twitter Card Tags <span class="badge badge-info">${tags.twitter.length} tags</span></h2>`;
                html += `<table class="tag-table"><thead><tr><th>Name</th><th>Content</th></tr></thead><tbody>`;
                for (const tag of tags.twitter) {
                    html += `<tr><td class="tag-name">${tag.name}</td><td class="tag-value">${tag.content}</td></tr>`;
                }
                html += `</tbody></table></div>`;
            }

            const otherMeta = tags.meta.filter(m =>
                !['description', 'robots', 'viewport', 'charset', 'author', 'theme-color'].includes(m.name.toLowerCase()) &&
                !m.name.startsWith('twitter:')
            );

            if (otherMeta.length) {
                html += `<div class="card"><h2>Other Meta Tags <span class="badge badge-info">${otherMeta.length} tags</span></h2>`;
                html += `<table class="tag-table"><thead><tr><th>Name</th><th>Content</th></tr></thead><tbody>`;
                for (const tag of otherMeta) {
                    html += `<tr><td class="tag-name">${tag.name}</td><td class="tag-value">${tag.content}</td></tr>`;
                }
                html += `</tbody></table></div>`;
            }

            resultsEl.innerHTML = html;
        }
    </script>
</body>
</html>
